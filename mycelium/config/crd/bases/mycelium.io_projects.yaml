---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: projects.mycelium.io
spec:
  group: mycelium.io
  names:
    categories:
    - mycelium
    kind: Project
    listKind: ProjectList
    plural: projects
    shortNames:
    - proj
    singular: project
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - description: The namespace for this project
      jsonPath: .status.namespace
      name: Namespace
      type: string
    - description: Whether the project is ready
      jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Project is the Schema for the projects API. Each Project is cluster-scoped
          and owns a namespace where Tools and CredentialProviders live.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProjectSpec defines the desired state of Project.
            properties:
              identityProvider:
                description: IdentityProvider configures the tenant's IdP for inbound
                  JWT validation.
                properties:
                  allowedClients:
                    description: AllowedClients are the allowed OAuth client IDs.
                    items:
                      type: string
                    maxItems: 64
                    type: array
                    x-kubernetes-validations:
                    - message: each client ID must be 1-256 characters
                      rule: self.all(c, size(c) >= 1 && size(c) <= 256)
                  allowedScopes:
                    description: AllowedScopes are the allowed OAuth scopes.
                    items:
                      type: string
                    maxItems: 64
                    type: array
                    x-kubernetes-validations:
                    - message: each scope must be 1-256 characters
                      rule: self.all(s, size(s) >= 1 && size(s) <= 256)
                  audiences:
                    description: Audiences are the allowed JWT audiences.
                    items:
                      type: string
                    maxItems: 16
                    minItems: 1
                    type: array
                    x-kubernetes-validations:
                    - message: each audience must be 1-256 characters
                      rule: self.all(a, size(a) >= 1 && size(a) <= 256)
                  issuer:
                    description: Issuer is the OIDC issuer URL.
                    format: uri
                    maxLength: 2048
                    minLength: 1
                    type: string
                required:
                - audiences
                - issuer
                type: object
              userVerifierUrl:
                description: UserVerifierURL is the developer-managed endpoint for
                  session binding.
                format: uri
                maxLength: 2048
                minLength: 1
                type: string
            required:
            - identityProvider
            - userVerifierUrl
            type: object
          status:
            description: ProjectStatus defines the observed state of Project.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest observations of the Project's state.
                  Known condition types: "Ready", "NamespaceReady"
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 8
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              namespace:
                description: Namespace is the name of the namespace created for this
                  project.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
