---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tools.mycelium.io
spec:
  group: mycelium.io
  names:
    kind: Tool
    listKind: ToolList
    plural: tools
    singular: tool
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Tool is the Schema for the tools API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ToolSpec defines the desired state of Tool.
            properties:
              container:
                description: Container defines the tool executor container.
                properties:
                  image:
                    description: Image is the container image for the tool executor.
                    minLength: 1
                    type: string
                required:
                - image
                type: object
              credentials:
                description: Credentials defines the credential providers required
                  by this tool.
                properties:
                  apiKeys:
                    description: |-
                      APIKeys are optional API key credential bindings. Multiple allowed,
                      since API keys don't require user authorization.
                    items:
                      description: APIKeyCredentialRef binds a tool to an API key
                        CredentialProvider.
                      properties:
                        providerRef:
                          description: ProviderRef references an API key CredentialProvider
                            in the same namespace.
                          properties:
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                          type: object
                          x-kubernetes-map-type: atomic
                      required:
                      - providerRef
                      type: object
                    type: array
                  oauth:
                    description: |-
                      OAuth is the optional OAuth credential binding. At most one per tool,
                      since each requires a user authorization flow.
                    properties:
                      providerRef:
                        description: ProviderRef references an OAuth CredentialProvider
                          in the same namespace.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      scopes:
                        description: Scopes are the OAuth scopes required by this
                          tool.
                        items:
                          type: string
                        minItems: 1
                        type: array
                    required:
                    - providerRef
                    - scopes
                    type: object
                type: object
              description:
                description: Description is the human-readable tool description.
                minLength: 1
                type: string
              inputSchema:
                description: InputSchema is the MCP-compatible JSON Schema for the
                  tool's input.
                x-kubernetes-preserve-unknown-fields: true
              scaling:
                description: Scaling defines optional scaling overrides for the Knative
                  Service.
                properties:
                  maxScale:
                    default: 10
                    description: MaxScale is the maximum number of replicas.
                    format: int32
                    minimum: 1
                    type: integer
                  minScale:
                    default: 0
                    description: MinScale is the minimum number of replicas (0 for
                      scale-to-zero).
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              toolName:
                description: |-
                  ToolName is the MCP tool name exposed to agents. Must be a valid
                  MCP tool identifier (lowercase alphanumeric and underscores).
                maxLength: 253
                minLength: 1
                pattern: ^[a-z][a-z0-9_]*$
                type: string
            required:
            - container
            - description
            - toolName
            type: object
          status:
            description: ToolStatus defines the observed state of Tool.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest observations of the Tool's state.
                  Known condition types: "Ready", "KnativeServiceReady", "CredentialsValid"
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              knativeServiceRef:
                description: |-
                  KnativeServiceRef references the generated Knative Service for this tool.
                  The controller sets an ownerReference on the Knative Service pointing back
                  to this Tool, so deleting the Tool cascade-deletes the Service.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
