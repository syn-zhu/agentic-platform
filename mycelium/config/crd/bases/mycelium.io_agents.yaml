---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: agents.mycelium.io
spec:
  group: mycelium.io
  names:
    categories:
    - mycelium
    kind: Agent
    listKind: AgentList
    plural: agents
    shortNames:
    - ag
    singular: agent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Whether the agent is ready
      jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Agent is the Schema for the agents API. Each Agent defines which Tools it
          can access and how its sandbox is configured.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentSpec defines the desired state of Agent.
            properties:
              container:
                description: Container defines the agent sandbox container.
                properties:
                  image:
                    description: Image is the container image for the agent.
                    maxLength: 1024
                    minLength: 1
                    type: string
                required:
                - image
                type: object
              description:
                description: Description is the human-readable agent description.
                maxLength: 1024
                minLength: 1
                type: string
              sandbox:
                description: Sandbox configures the agent sandbox lifecycle. If nil,
                  defaults are used.
                properties:
                  shutdownTimeout:
                    description: |-
                      ShutdownTimeout is the duration after which an idle sandbox is released.
                      Format: Go duration string (e.g., "30m", "1h").
                    maxLength: 32
                    minLength: 1
                    pattern: ^[0-9]+(s|m|h)$
                    type: string
                  warmPool:
                    description: WarmPool configures pre-warmed sandbox pods for this
                      agent.
                    properties:
                      replicas:
                        default: 1
                        description: Replicas is the number of pre-warmed sandbox
                          pods to maintain.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                    required:
                    - replicas
                    type: object
                required:
                - shutdownTimeout
                type: object
              tools:
                description: |-
                  Tools are the tools this agent can access, as typed references to Tool resources
                  in the same namespace. The Mycelium controller uses this to generate the
                  AGW tool-access policy CEL expressions.
                items:
                  description: ToolRef is a reference to a Tool in the same namespace.
                  properties:
                    ref:
                      description: Ref references a Tool by name in the same namespace.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                  required:
                  - ref
                  type: object
                maxItems: 64
                minItems: 1
                type: array
            required:
            - container
            - description
            - tools
            type: object
          status:
            description: AgentStatus defines the observed state of Agent.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest observations of the Agent's state.
                  Known condition types: "Ready", "ToolsValid"
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 8
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              serviceAccount:
                description: |-
                  ServiceAccount is the K8s service account name derived from this agent.
                  Used in tool-access policy CEL expressions for identity resolution.
                type: string
              warmPoolRef:
                description: WarmPoolRef references the generated SandboxWarmPool
                  for this agent.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
