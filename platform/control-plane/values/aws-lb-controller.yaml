# AWS Load Balancer Controller — provisions NLB/ALB for LoadBalancer Services and Ingress
# Required for the Istio ingress gateway internal NLB
clusterName: agentic-cp
region: us-east-1

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::268558157000:role/agentic-cp-aws-lb-controller

# VPC ID must be provided explicitly (IMDS not always accessible with Istio sidecar)
vpcId: vpc-0633964670a3bb7ff

# Only manage resources with specific ingress class to avoid conflicts with Istio
enableServiceMutatorWebhook: false
