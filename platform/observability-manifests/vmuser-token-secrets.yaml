# Bearer token secrets for VMUser CRs.
# Each VMUser references its token via tokenRef.
# The same token is distributed to each cluster's monitoring namespace
# as vmagent-remote-write-token (by 03-apply-obs-manifests.sh).
#
# Tokens are generated once and committed. Rotate by updating these
# secrets and re-running the distribution script.
apiVersion: v1
kind: Secret
metadata:
  name: vmuser-token-agentic-cp
  namespace: monitoring
type: Opaque
stringData:
  token: "vmauth-cp-d8f3a1b7e924c065"
