# OpenTelemetry Collector — control-plane cluster (otel-system namespace)
#
# Receives OTLP gRPC (4317) and HTTP (4318) from local platform services,
# enriches spans with Kubernetes pod/namespace metadata and a fixed
# k8s.cluster.name attribute, then exports to the Langfuse instance that
# runs in the same cluster.
#
# Services that send traces:
#   - AgentRegistry (OTLP gRPC / HTTP)
#   - OpenFGA       (OTLP gRPC)
#   - Keycloak      (OTLP HTTP)
#   - Future cell agents forwarded via TGW

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: otel-system
  labels:
    app: otel-collector

---
# ClusterRole required by the k8sattributes processor to read pod/namespace
# metadata across the entire cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-k8s-observer
  labels:
    app: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-k8s-observer
  labels:
    app: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: otel-system
roleRef:
  kind: ClusterRole
  name: otel-collector-k8s-observer
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: otel-system
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512

      # Enrich spans with pod name, namespace, deployment, and node labels
      # from the Kubernetes API server.
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app
              key: app
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      # Stamp every span/metric/log with the cluster name so Langfuse and
      # any future backends can distinguish control-plane telemetry from
      # cell-cluster telemetry.
      resource:
        attributes:
          - key: k8s.cluster.name
            value: "agentic-cp"
            action: upsert

    exporters:
      otlphttp:
        endpoint: "http://langfuse-web.langfuse.svc.cluster.local:3000/api/public/otel"
        headers:
          Authorization: "${env:LANGFUSE_AUTH_HEADER}"
        tls:
          insecure: true

    service:
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, k8sattributes, resource]
          exporters: [otlphttp]
        logs:
          receivers: [otlp]
          processors: [batch, k8sattributes, resource]
          exporters: [otlphttp]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: otel-system
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.145.0
          args: ["--config=/etc/otel/config.yaml"]
          env:
            - name: LANGFUSE_AUTH_HEADER
              valueFrom:
                secretKeyRef:
                  name: otel-collector-auth
                  key: AUTH_HEADER
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: otel-system
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
