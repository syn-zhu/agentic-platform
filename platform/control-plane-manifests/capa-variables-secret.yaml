# CAPA template variables for infrastructure-components.yaml substitution.
# AWS_CONTROLLER_IAM_ROLE is substituted at deploy time:
#   CAPA_ROLE_ARN=arn:aws:iam::ACCOUNT:role/NAME envsubst '$CAPA_ROLE_ARN' < capa-variables-secret.yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: capa-variables
  namespace: capa-system
stringData:
  # Empty credentials — IRSA provides credentials via the SA projected token
  AWS_B64ENCODED_CREDENTIALS: ""
  # IAM role ARN for CAPA controller IRSA
  AWS_CONTROLLER_IAM_ROLE: "${CAPA_ROLE_ARN}"
  # Enable MachinePool support (required for AWSManagedMachinePool / EKS managed node groups)
  EXP_MACHINE_POOL: "true"
  # Enable CAPA to auto-create IAM roles for EKS clusters (control plane role, node role, etc.)
  CAPA_EKS_IAM: "true"
  # Allow adding custom IAM roles to EKS clusters
  CAPA_EKS_ADD_ROLES: "true"
