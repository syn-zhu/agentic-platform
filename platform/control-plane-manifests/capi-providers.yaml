# CAPI Core Provider — must be installed before infrastructure providers
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: CoreProvider
metadata:
  name: cluster-api
  namespace: capi-system
spec:
  version: v1.10.1
---
# CAPA Infrastructure Provider — manages EKS clusters
# Requires AWS credentials via configSecret. The secret contains a base64-encoded
# AWS credentials file. When using IRSA, the credentials file can have empty keys
# (IRSA provides credentials via the pod's projected service account token).
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: aws
  namespace: capa-system
spec:
  version: v2.7.1
  configSecret:
    name: aws-credentials
  manager:
    featureGates:
      EKS: true
      MachinePool: true
