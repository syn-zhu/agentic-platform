# Kiali Operator — installed on the obs cluster.
# Operator creates a Kiali CR (cr.create: true) in monitoring namespace.
# Auth strategy is anonymous (internal obs cluster, no external exposure initially).
# Prometheus endpoint points to VictoriaMetrics VMSingle (Prometheus-compatible API).
# Grafana in_cluster_url points to the grafana Service in the monitoring namespace.
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: kiali-operator
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      observability: "true"
  repoURL: https://kiali.org/helm-charts
  chartName: kiali-operator
  releaseName: kiali-operator
  namespace: kiali-operator
  valuesTemplate: |
    cr:
      create: true
      namespace: monitoring
      spec:
        auth:
          strategy: anonymous
        external_services:
          prometheus:
            url: http://vmsingle-vm.monitoring.svc:8429
          grafana:
            enabled: true
            in_cluster_url: http://grafana.monitoring.svc:80
            url: http://grafana.monitoring.svc:80
          istio:
            gateway_api_classes:
              - class_name: istio
                name: Istio
