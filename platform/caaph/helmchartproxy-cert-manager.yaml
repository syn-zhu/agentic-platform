# cert-manager — installed on the obs cluster to issue TLS certificates for VMAuth
# Required before victoria-metrics-operator and vmauth can use TLS.
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: cert-manager
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      observability: "true"
  repoURL: https://charts.jetstack.io
  chartName: cert-manager
  version: v1.17.1
  releaseName: cert-manager
  namespace: cert-manager
  valuesTemplate: |
    crds:
      enabled: true
