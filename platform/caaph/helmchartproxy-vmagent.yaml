# vmagent — installed on ALL clusters (matched by monitoring=vmagent label).
# Scrapes cluster metrics and remote-writes to the VMAuth NLB endpoint on the obs cluster.
# externalLabels injects the cluster name via the CAAPH Go template variable
# {{ .Cluster.metadata.name }}, so each cluster's metrics are tagged with cluster="<name>".
#
# remoteWrite.url points to the VMAuth internal NLB on the obs cluster.
#
# Per-cluster bearer tokens are stored as Secrets in each cluster's monitoring namespace
# (distributed by 03-apply-obs-manifests.sh) and mounted as a file for vmagent.
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: vmagent
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      monitoring: vmagent
  repoURL: https://victoriametrics.github.io/helm-charts
  chartName: victoria-metrics-agent
  releaseName: vmagent
  namespace: monitoring
  valuesTemplate: |
    deployment:
      enabled: true

    # Tolerate all taints so vmagent can schedule on cell cluster nodes
    tolerations:
      - operator: Exists

    externalLabels:
      cluster: "{{ .Cluster.metadata.name }}"

    remoteWrite:
      - url: https://k8s-monitori-vmauthex-cffc274934-d3f976225245203f.elb.us-east-1.amazonaws.com/api/v1/write

    extraArgs:
      remoteWrite.bearerTokenFile: /etc/vmagent-token/token
      remoteWrite.tlsInsecureSkipVerify: "true"
      remoteWrite.label: "cluster={{ .Cluster.metadata.name }}"

    extraVolumes:
      - name: bearer-token
        secret:
          secretName: vmagent-remote-write-token

    extraVolumeMounts:
      - name: bearer-token
        mountPath: /etc/vmagent-token
        readOnly: true

    config:
      global:
        scrape_interval: 30s
