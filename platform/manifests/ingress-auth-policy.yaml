# Ingress Authentication Policy
#
# Enforces JWT authentication on all inbound traffic through the ingress
# gateway (agentgateway-proxy). Every request must carry a valid Keycloak-
# issued bearer token with the correct issuer and an organization claim.
#
# What this enforces:
#   1. Token signature validation via Keycloak JWKS endpoint
#   2. Issuer must be the "agents" realm
#   3. Token must contain an "organization" claim (multi-tenancy gate via Keycloak Organizations)
#
# No audience check at ingress -- the ingress gateway is a transport layer,
# not a resource server. Audience validation belongs at the per-agent waypoint
# policy, where each agent can require its own audience.
#
# Prerequisites: Keycloak must be running with the "agents" realm configured
# and Organizations enabled.
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ingress-auth-policy
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  traffic:
    jwtAuthentication:
      mode: Strict
      providers:
        - issuer: "http://keycloak.keycloak.svc.cluster.local:8080/realms/agents"
          jwks:
            remote:
              jwksPath: "/realms/agents/protocol/openid-connect/certs"
              backendRef:
                group: ""
                kind: Service
                name: keycloak
                namespace: keycloak
                port: 8080
    authorization:
      policy:
        matchExpressions:
          - "has(jwt.organization)"
