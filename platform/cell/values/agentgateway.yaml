# AgentGateway for cell clusters — manages cell gateway + per-tenant waypoints
# Adapted from platform/values/agentgateway.yaml

# Proxy (dataplane) image
image:
  registry: 268558157000.dkr.ecr.us-east-1.amazonaws.com/agentic-platform
  tag: "0.12.0-waypoint"
  pullPolicy: Always

# Controller image
controller:
  image:
    registry: 268558157000.dkr.ecr.us-east-1.amazonaws.com/agentic-platform
    repository: agentgateway-controller
    tag: "v0.12.0-waypoint"
  replicaCount: 1
  logLevel: info
  # Tolerate all cell node taints so controller can schedule on any node
  tolerations:
    - operator: Exists

# Watch tenant namespaces with this label for Gateway, HTTPRoute, Backend resources
discoveryNamespaceSelectors:
  - matchLabels:
      platform.agentic.io/gateway-discovery: "true"
