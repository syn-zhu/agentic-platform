repositories:
  - name: istio
    url: https://istio-release.storage.googleapis.com/charts

helmDefaults:
  createNamespace: true
  wait: true
  timeout: 300

releases:
  - name: istio-base
    namespace: istio-system
    chart: istio/base
    version: "1.29.1"

  - name: istiod
    namespace: istio-system
    chart: istio/istiod
    version: "1.29.1"
    values:
      - values/istiod-ambient.yaml
    needs:
      - istio-system/istio-base

  - name: istio-cni
    namespace: istio-system
    chart: istio/cni
    version: "1.29.1"
    values:
      - values/istio-cni.yaml
    needs:
      - istio-system/istiod

  - name: ztunnel
    namespace: istio-system
    chart: istio/ztunnel
    version: "1.29.1"
    values:
      - values/ztunnel.yaml
    needs:
      - istio-system/istio-cni
