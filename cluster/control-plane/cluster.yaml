apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: agentic-cp
  region: us-east-1
  version: "1.31"

vpc:
  cidr: "10.1.0.0/16"
  nat:
    gateway: Single

iam:
  withOIDC: true

addons:
  - name: vpc-cni
    version: latest
    configurationValues: '{"enableNetworkPolicy":"true"}'
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest

managedNodeGroups:
  - name: platform
    instanceType: t3.large
    minSize: 2
    maxSize: 4
    desiredCapacity: 2
    labels:
      node-role: platform
    volumeSize: 30
    volumeType: gp3
    tags:
      role: platform
      cluster: agentic-cp
