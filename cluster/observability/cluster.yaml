apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: agentic-obs
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["192.168.0.0/16"]
    services:
      cidrBlocks: ["10.96.0.0/12"]
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
    kind: AWSManagedCluster
    name: agentic-obs
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta2
    kind: AWSManagedControlPlane
    name: agentic-obs
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSManagedCluster
metadata:
  name: agentic-obs
  namespace: default
spec: {}
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: AWSManagedControlPlane
metadata:
  name: agentic-obs
  namespace: default
spec:
  eksClusterName: agentic-obs
  region: us-east-1
  version: v1.35.0
  network:
    vpc:
      cidrBlock: "10.2.0.0/16"
  associateOIDCProvider: true
  addons: []
  endpointAccess:
    public: true
    private: true
  bastion:
    enabled: false
  additionalTags:
    project: agentic-platform
    cluster-type: observability
