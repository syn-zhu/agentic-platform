# Per-tenant pool operator deployment.
# Manages ExecutorPool CRs and warm executor pods within this namespace only.
#
# Substitution variables (replaced by onboarding script):
#   ${NAMESPACE} — the tenant's namespace name
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pool-operator
  namespace: ${NAMESPACE}
---
# Per-namespace Role (not ClusterRole) — operator can only manage
# pods and ExecutorPools within its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pool-operator
  namespace: ${NAMESPACE}
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, create, delete, patch, update]
  - apiGroups: [pool.agentic.dev]
    resources: [executorpools, executorpools/status]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pool-operator
  namespace: ${NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: pool-operator
    namespace: ${NAMESPACE}
roleRef:
  kind: Role
  name: pool-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pool-operator
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pool-operator
  template:
    metadata:
      labels:
        app: pool-operator
    spec:
      serviceAccountName: pool-operator
      containers:
        - name: pool-operator
          image: 268558157000.dkr.ecr.us-east-1.amazonaws.com/agentic-platform/pool-operator:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8081
              name: health
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 5
          env:
            - name: NAMESPACE
              value: "${NAMESPACE}"
            - name: LISTEN_ADDR
              value: ":50051"
            - name: HEALTH_ADDR
              value: ":8081"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pool-operator
  namespace: ${NAMESPACE}
spec:
  selector:
    app: pool-operator
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
